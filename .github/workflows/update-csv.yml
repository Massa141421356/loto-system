name: ロトCSV自動更新

# 毎日 22:00（日本時間）に自動実行。手動実行（workflow_dispatch）も可能。
on:
  schedule:
    - cron: "0 13 * * *"   # UTC 13:00 = JST 22:00
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: 最新CSVをダウンロード
        run: |
          mkdir -p data
          curl -fsSL -o data/loto6_history.csv https://loto6.thekyo.jp/data/loto6.csv
          curl -fsSL -o data/loto7_history.csv https://loto7.thekyo.jp/data/loto7.csv
          echo "--- loto6 サイズ ---"; wc -c data/loto6_history.csv
          echo "--- loto7 サイズ ---"; wc -c data/loto7_history.csv

      - name: 変更があればコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/loto6_history.csv data/loto7_history.csv
          if git diff --cached --quiet; then
            echo "変更なし（前回取得分と同じ内容です）"
          else
            git commit -m "自動更新: 最新の抽選結果CSV ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
